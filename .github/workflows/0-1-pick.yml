name: 0-1 Pick

on:
  issues:
    types: [edited]

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  get_selected_option:
    name: Get Selected Option
    runs-on: ubuntu-latest
    if: ${{ !endsWith(github.actor, '[bot]') }}

    outputs:
      checked-item-value: ${{ steps.get-checked-item.outputs.checked-item-value }}

    steps:
      - name: Get Checked Item
        id: get-checked-item
        uses: actions/github-script@v7
        with:
          script: |
            // Get the updated issue body from the event payload
            const issueBody = process.env.ISSUE_BODY || '';

            // Get all checkboxes
            const checkboxes = [...issueBody.matchAll(/- \[([ xX])\] (.+)/g)];
            console.log(`Checkboxes found: ${checkboxes.length}`);

            // Get the first checked item
            let checked_item_value = null;
            for (const checkbox of checkboxes) {
              if (checkbox[1].toLowerCase() === 'x') {
                checked_item_value = checkbox[2].trim();
                break;
              }
            }

            // If no checked item found, nothing to do
            if (!checked_item_value) {
              core.info('No checkboxes selected.');
              core.setOutput('checked-item-value', '');
              return;
            }

            // Trim and make lowercase
            checked_item_value = checked_item_value.trim().toLowerCase();

            // Log the checked item's value
            console.log(`Checked item value: ${checked_item_value}`);

            // Return the checked item's value
            core.setOutput('checked-item-value', checked_item_value);
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}

  disable_checkboxes:
    name: Disable Checkboxes
    needs: [get_selected_option]
    if: needs.get_selected_option.outputs.checked-item-value != ''
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Disable Checkboxes in Issue Body
        uses: actions/github-script@v7
        with:
          script: |
            // Get the updated issue body from the event payload
            const issueBody = process.env.ISSUE_BODY || '';

            // Disable all checkboxes in the issue body
            const updatedBody = issueBody.replace(/- \[([ xX])\] (.+)/g, (match, checked, label) => {
              const emoji = String(checked).toLowerCase() === 'x' ? '✅' : '⬜️';
              return `${emoji} ${label}`;
            });

            // Update the issue with the modified body, retrying on 5xx errors
            let lastError;
            for (let attempt = 1; attempt <= 3; attempt++) {
              try {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: Number(process.env.ISSUE_NUMBER),
                  body: updatedBody
                });
                return;
              } catch (err) {
                lastError = err;
                if (!err.status || err.status < 500 || attempt === 3) break;
                await new Promise(r => setTimeout(r, 1000 * attempt));
              }
            }
            throw lastError;
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}

  # Trigger the appropriate workflow based on the selected option
  mona:
    name: 1 Mona
    needs: [get_selected_option]
    if: needs.get_selected_option.outputs.checked-item-value == 'mona - intermediate'
    uses: ./.github/workflows/1-1-mona-start.yml
    secrets: inherit
    with:
      issue-number: ${{ github.event.issue.number }}

  copilot:
    name: 2 Copilot
    needs: [get_selected_option]
    if: needs.get_selected_option.outputs.checked-item-value == 'copilot - advanced'
    uses: ./.github/workflows/2-1-copilot-start.yml
    secrets: inherit
    with:
      issue-number: ${{ github.event.issue.number }}

  ducky:
    name: 3 Ducky
    needs: [get_selected_option]
    if: needs.get_selected_option.outputs.checked-item-value == 'ducky - beginner'
    uses: ./.github/workflows/3-1-ducky-start.yml
    secrets: inherit
    with:
      issue-number: ${{ github.event.issue.number }}
