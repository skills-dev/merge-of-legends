name: 0 Bootstrap README

# One-shot README bootstrap. Runs only on direct `push` events to the
# default branch and only on cloned template repos (never on the
# source template `skills-dev/merge-of-legends`). Kept in its own
# workflow file (rather than a job inside 0-0-start.yml) so its
# `contents: write` permission does not have to be granted by every
# caller of the reusable 0-0-start workflow — the check workflows
# only need `contents: read` and would otherwise fail with
# `startup_failure` because reusable-workflow permission validation
# happens before `if:` is evaluated.

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  EXERCISE_TITLE: "Merge of Legends"

jobs:
  update_readme:
    name: Bootstrap README from start-game template
    runs-on: ubuntu-latest
    if: ${{ github.repository != 'skills-dev/merge-of-legends' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Render start-game README
        id: render-readme
        uses: ./.github/actions/render-markdown-template
        with:
          template-file: .github/markdown-templates/readme/start-game.md
          template-vars: |
            game_title: ${{ env.EXERCISE_TITLE }}
            issues_url: ${{ github.server_url }}/${{ github.repository }}/issues
            login: ${{ github.repository_owner }}

      - name: Publish README if changed
        uses: actions/github-script@v7
        env:
          RENDERED_README: ${{ steps.render-readme.outputs.rendered-text }}
        with:
          script: |
            const path = 'README.md';
            const rendered = process.env.RENDERED_README || '';
            const branch = context.ref.replace(/^refs\/heads\//, '');

            if (!rendered.trim()) {
              core.setFailed('Rendered README is empty; refusing to publish.');
              return;
            }

            let currentFile = null;
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                ref: branch,
              });
              currentFile = data;
            } catch (err) {
              if (err.status !== 404) throw err;
            }

            const currentContent = currentFile
              ? Buffer.from(currentFile.content, currentFile.encoding || 'base64').toString('utf8')
              : '';

            // One-shot guard: only bootstrap when the README still carries
            // the source-template "Copy Game" marker. After the first
            // bootstrap (or any manual edit that removes the marker) this
            // step is a no-op, so legitimate README changes in cloned
            // repos are never overwritten.
            const TEMPLATE_MARKER = 'template_owner=skills-dev&template_name=merge-of-legends';
            if (!currentContent.includes(TEMPLATE_MARKER)) {
              core.info('README no longer contains template-source marker; skipping bootstrap.');
              return;
            }

            if (currentContent === rendered) {
              core.info('README already up to date; no commit needed.');
              return;
            }

            const result = await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path,
              message: 'docs: bootstrap README from start-game template',
              content: Buffer.from(rendered, 'utf8').toString('base64'),
              sha: currentFile ? currentFile.sha : undefined,
              branch,
            });

            core.info(`Published README at commit ${result.data.commit.sha}.`);
