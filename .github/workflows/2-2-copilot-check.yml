name: 2-2 Copilot Check

on:
  issue_comment:
    types: [edited]

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  check_step_work:
    name: Check step work
    runs-on: ubuntu-latest
    if: ${{ !endsWith(github.actor, '[bot]') }}
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}

    outputs:
      all_passed: ${{ steps.verify-checks.outputs.all_passed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get question 1
        id: get-question-1
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          body-includes: "## 1."
          direction: last

      - name: Check question 1
        id: check-question-1
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const { getCheckboxes, getCheckedValue, disableCheckboxes, resetCheckboxes, removeAlerts } = require("./.github/workflows/actions-utils");

            // Get the updated issue body from the event payload
            let commentBody = process.env.COMMENT_BODY;

            // Get the checkboxes and value
            const checkboxes = getCheckboxes(commentBody);
            const checked_item_value = getCheckedValue(checkboxes);
            const checked_item_value_normalized = checked_item_value ? checked_item_value.trim().toLowerCase() : "";

            // If no checkboxes or no values, end early
            if (checkboxes.length > 0 && !checked_item_value) {
              core.setFailed('Question 1 - Waiting for answer');
              return;
            } else if (checkboxes.length === 0) {
              // Finished already. Nothing to do
              return;
            }

            // Determine if the answer is correct
            let is_correct = (checked_item_value_normalized === "provide clear context, constraints, and expected output");

            // Remove any existing alerts
            commentBody = removeAlerts(commentBody);

            // Add feedback based on correctness
            if (is_correct) {
              // Disable checkboxes to prevent further changes
              commentBody = disableCheckboxes(commentBody);

              // Add feedback
              commentBody += `\n\n
            > [!TIP]
            > ✅ Great job! Clear prompts help Copilot produce useful suggestions. :copilot:
            `;
            } else {
              // Reset checkboxes to unchecked state
              commentBody = resetCheckboxes(commentBody);

              // Add feedback
              commentBody += `\n\n
            > [!Caution]
            > ❌ Not quite. Copilot works best when your prompt includes context and constraints.
            `;

              // Fail the workflow step
              core.setFailed('Question 1 is incorrect.');
            }

            // Use GitHub API to update the comment
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: parseInt(process.env.COMMENT_ID),
              body: commentBody
            });

        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_ID: ${{ steps.get-question-1.outputs.comment-id }}
          COMMENT_BODY: ${{ steps.get-question-1.outputs.comment-body }}

      - name: Get question 2
        id: get-question-2
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          body-includes: "## 2."
          direction: last

      - name: Check question 2
        id: check-question-2
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const { getCheckboxes, getCheckedValue, disableCheckboxes, resetCheckboxes, removeAlerts } = require("./.github/workflows/actions-utils");

            // Get the updated issue body from the event payload
            let commentBody = process.env.COMMENT_BODY;

            // Get the checkboxes and value
            const checkboxes = getCheckboxes(commentBody);
            const checked_item_value = getCheckedValue(checkboxes);
            const checked_item_value_normalized = checked_item_value ? checked_item_value.trim().toLowerCase() : "";

            // If no checkboxes or no values, end early
            if (checkboxes.length > 0 && !checked_item_value) {
              core.setFailed('Question 2 - Waiting for answer');
              return;
            } else if (checkboxes.length === 0) {
              // Finished already. Nothing to do
              return;
            }

            // Determine if the answer is correct
            let is_correct = (checked_item_value_normalized === "review it, run tests, and validate security before merging");

            // Remove any existing alerts
            commentBody = removeAlerts(commentBody);

            // Add feedback based on correctness
            if (is_correct) {
              // Disable checkboxes to prevent further changes
              commentBody = disableCheckboxes(commentBody);

              // Add feedback
              commentBody += `\n\n
            > [!TIP]
            > ✅ Exactly. Copilot accelerates coding, but you still own review and verification. :copilot:
            `;
            } else {
              // Reset checkboxes to unchecked state
              commentBody = resetCheckboxes(commentBody);

              // Add feedback
              commentBody += `\n\n
            > [!Caution]
            > ❌ Not quite. Always review generated code, run tests, and confirm security before merge.
            `;

              // Fail the workflow step
              core.setFailed('Question 2 is incorrect.');
            }

            // Use GitHub API to update the comment
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: parseInt(process.env.COMMENT_ID),
              body: commentBody
            });

        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_ID: ${{ steps.get-question-2.outputs.comment-id }}
          COMMENT_BODY: ${{ steps.get-question-2.outputs.comment-body }}

      - name: Get question 3
        id: get-question-3
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          body-includes: "## 3."
          direction: last

      - name: Check question 3
        id: check-question-3
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const { getCheckboxes, getCheckedValue, disableCheckboxes, resetCheckboxes, removeAlerts } = require("./.github/workflows/actions-utils");

            // Get the updated issue body from the event payload
            let commentBody = process.env.COMMENT_BODY;

            // Get the checkboxes and value
            const checkboxes = getCheckboxes(commentBody);
            const checked_item_value = getCheckedValue(checkboxes);
            const checked_item_value_normalized = checked_item_value ? checked_item_value.trim().toLowerCase() : "";

            // If no checkboxes or no values, end early
            if (checkboxes.length > 0 && !checked_item_value) {
              core.setFailed('Question 3 - Waiting for answer');
              return;
            } else if (checkboxes.length === 0) {
              // Finished already. Nothing to do
              return;
            }

            // Determine if the answer is correct
            let is_correct = (checked_item_value_normalized === "refine the prompt with clearer requirements and ask again");

            // Remove any existing alerts
            commentBody = removeAlerts(commentBody);

            // Add feedback based on correctness
            if (is_correct) {
              // Disable checkboxes to prevent further changes
              commentBody = disableCheckboxes(commentBody);

              // Add feedback
              commentBody += `\n\n
            > [!TIP]
            > ✅ Nice! Iterating on prompts with better context is a core Copilot skill. :copilot:
            `;
            } else {
              // Reset checkboxes to unchecked state
              commentBody = resetCheckboxes(commentBody);

              // Add feedback
              commentBody += `\n\n
            > [!Caution]
            > ❌ Not quite. Improve Copilot output by refining your prompt and trying again.
            `;

              // Fail the workflow step
              core.setFailed('Question 3 is incorrect.');
            }

            // Use GitHub API to update the comment
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: parseInt(process.env.COMMENT_ID),
              body: commentBody
            });

        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_ID: ${{ steps.get-question-3.outputs.comment-id }}
          COMMENT_BODY: ${{ steps.get-question-3.outputs.comment-body }}

      - name: Verify all checks passed
        id: verify-checks
        uses: actions/github-script@v7
        env:
          steps_outcomes: ${{ toJson(steps.*.outcome) }}
        with:
          script: |
            // Log all step outcomes for debugging
            core.info(`Steps outcomes: ${process.env.steps_outcomes}`);

            // Check if any step has 'failure' outcome
            const allPassed = !process.env.steps_outcomes.includes('failure');
            core.setOutput('all_passed', allPassed.toString());

            // Log result
            if (allPassed) {
              core.info('All checks passed.');
            } else {
              core.info('Some checks failed. Please review the comments for details.');
            }

  finish_challenge:
    name: Finish challenge
    needs: check_step_work
    runs-on: ubuntu-latest
    if: needs.check_step_work.outputs.all_passed == 'true'
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add comment - finish
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ".github/steps/2-5-copilot-finish.md"

      # - name: Add comment - next challenge
      #   uses: GrantBirki/comment@v2.1.1
      #   with:
      #     issue-number: ${{ env.ISSUE_NUMBER }}
      #     file: ".github/steps/x-next-challenge.md"

      - name: Add comment - share links
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ".github/steps/x-share-links.md"
          vars: |
            socials_text: "I just earned the Goggles of Insight from Copilot in the Merge of Legends GitHub Skills quest! 🧙"

      - name: Add comment - show tip
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ".github/steps/2-6-copilot-tip.md"

      - name: Build issue description
        id: build-next-issue-description
        uses: skills/action-text-variables@v3
        with:
          template-file: .github/steps/0-0-start.md
          template-vars: |
            none: "none"

      - name: Find or create next issue
        id: find-or-create-next-issue
        uses: actions/github-script@v7
        with:
          script: |
            const expectedTitle = `${process.env.ISSUE_TITLE_PREFIX}${process.env.EXERCISE_TITLE}`;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            const existingIssue = issues.find(issue => !issue.pull_request && issue.title === expectedTitle && issue.number !== Number(process.env.ISSUE_NUMBER));
            const nextIssue = existingIssue || (await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: expectedTitle,
              body: process.env.ISSUE_BODY
            })).data;
            core.setOutput('issue_url', nextIssue.html_url);
        env:
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
          ISSUE_BODY: ${{ steps.build-next-issue-description.outputs.updated-text }}
          EXERCISE_TITLE: "Merge of Legends"
          ISSUE_TITLE_PREFIX: "Quest: "

      - name: Add comment - close with next issue link
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ".github/steps/x-close-with-next-link.md"
          vars: |
            next_issue_url: ${{ steps.find-or-create-next-issue.outputs.issue_url }}

      - name: Close the issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: process.env.ISSUE_NUMBER,
              state: 'closed'
            });
        env:
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}

      - name: Disable current workflow
        run: |
          gh workflow disable "2-2 Copilot Check" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
