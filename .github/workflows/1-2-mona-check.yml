name: 1-2 Mona Check

on:
  issue_comment:
    types: [edited]

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  check_step_work:
    name: Check step work
    runs-on: ubuntu-latest
    if: ${{ !endsWith(github.actor, '[bot]') }}
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}

    outputs:
      all_passed: ${{ steps.verify-checks.outputs.all_passed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check dates order
        id: check-dates-order
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            // Import the check-date-order.js script
            const { parseDatesFromText, countNotAscending } = require('./.github/workflows/check-date-order');

            // Get dates from text as array then check if in ascending order
            const dates = parseDatesFromText(process.env.ISSUE_BODY);
            const notAscCount = countNotAscending(dates);

            // Set output with count out of order (for feedback)
            core.setOutput('not-asc-count', notAscCount);

            // If more than 1 out of order, fail this step
            if (notAscCount > 0) {
              core.setFailed('Dates are not in ascending order. Found ' + notAscCount + ' mistake(s).');
            }
        env:
          ISSUE_BODY: ${{ github.event.comment.body }}

      - name: Find review comment
        id: find-review-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          body-includes: inspection
          direction: last

      - name: Create or update comment - step results
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-review-comment.outputs.comment-id }}
          edit-mode: replace
          file: ".github/steps/1-4-mona-talk.md"
          vars: |
            not_asc_count: ${{ steps.check-dates-order.outputs.not-asc-count }}

      - name: Verify all checks passed
        id: verify-checks
        uses: actions/github-script@v7
        env:
          steps_outcomes: ${{ toJson(steps.*.outcome) }}
        with:
          script: |
            // Log all step outcomes for debugging
            core.info(`Steps outcomes: ${process.env.steps_outcomes}`);

            // Check if any step has 'failure' outcome
            const allPassed = !process.env.steps_outcomes.includes('failure');
            core.setOutput('all_passed', allPassed.toString());

            // Log result
            if (allPassed) {
              core.info('All checks passed.');
            } else {
              core.info('Some checks failed. Please review the comments for details.');
            }

  finish_challenge:
    name: Finish challenge
    needs: check_step_work
    runs-on: ubuntu-latest
    if: needs.check_step_work.outputs.all_passed == 'true'
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add comment - finish
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ".github/steps/1-5-mona-finish.md"

      # - name: Add comment - next challenge
      #   uses: GrantBirki/comment@v2.1.1
      #   with:
      #     issue-number: ${{ env.ISSUE_NUMBER }}
      #     file: ".github/steps/x-next-challenge.md"

      - name: Add comment - show tip
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ".github/steps/1-6-mona-tip.md"

      - name: Add comment - share links
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ".github/steps/x-share-links.md"
          vars: |
            socials_text: "I just earned the Fork of Curiosity from Mona in the Merge of Legends GitHub Skills quest! 🧙"

      - name: Build issue description
        id: build-next-issue-description
        uses: skills/action-text-variables@v3
        with:
          template-file: .github/steps/0-0-start.md
          template-vars: |
            none: "none"

      - name: Find or create next issue
        id: find-or-create-next-issue
        uses: actions/github-script@v7
        with:
          script: |
            const expectedTitle = `${process.env.ISSUE_TITLE_PREFIX}${process.env.EXERCISE_TITLE}`;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            const existingIssue = issues.find(issue => !issue.pull_request && issue.title === expectedTitle && issue.number !== Number(process.env.ISSUE_NUMBER));
            const nextIssue = existingIssue || (await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: expectedTitle,
              body: process.env.ISSUE_BODY
            })).data;
            core.setOutput('issue_url', nextIssue.html_url);
        env:
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
          ISSUE_BODY: ${{ steps.build-next-issue-description.outputs.updated-text }}
          EXERCISE_TITLE: "Merge of Legends"
          ISSUE_TITLE_PREFIX: "Quest: "

      - name: Add comment - close with next issue link
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ".github/steps/x-close-with-next-link.md"
          vars: |
            next_issue_url: ${{ steps.find-or-create-next-issue.outputs.issue_url }}

      - name: Pause before closing
        run: sleep 5

      - name: Close the issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: process.env.ISSUE_NUMBER,
              state: 'closed'
            });
        env:
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}

      - name: Disable current workflow
        run: |
          gh workflow disable "1-2 Mona Check" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
