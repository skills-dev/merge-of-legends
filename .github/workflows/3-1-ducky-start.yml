name: 3-1 Ducky Start

on:
  workflow_call:
    inputs:
      issue-number:
        description: "The issue number to show the challenge description"
        required: true
        type: number

jobs:
  show_challenge:
    name: Show Challenge
    runs-on: ubuntu-latest
    env:
      REPO_IMAGE_BASE_URL: ${{ github.server_url }}/${{ github.repository }}/raw/${{ github.event.repository.default_branch }}/.github/images

    steps:
      - uses: actions/checkout@v5

      - name: Add comment - show file content
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ inputs.issue-number }}
          file: ".github/steps/3-1-ducky-intro.md"
          vars: |
            ducky_intro_image_url: ${{ env.REPO_IMAGE_BASE_URL }}/ducky-intro.png
            mona_intro_image_url: ${{ env.REPO_IMAGE_BASE_URL }}/mona-intro.png
            copilot_intro_image_url: ${{ env.REPO_IMAGE_BASE_URL }}/copilot-intro.png

      - name: Add comment - show task
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ inputs.issue-number }}
          file: ".github/steps/3-2-ducky-talk.md"
          vars: |
            repo_image_base_url: ${{ env.REPO_IMAGE_BASE_URL }}

      - name: Disable current workflow and enable next workflow
        run: |
          gh workflow disable "3-1 Ducky Start" || true
          gh workflow enable "3-2 Ducky Check" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
