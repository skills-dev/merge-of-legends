name: 0-0 Start

on:
  workflow_dispatch:
  workflow_call:
  issues:
    types: [closed]

permissions:
  contents: read
  actions: write
  issues: write

env:
  EXERCISE_TITLE: "Merge of Legends"
  ISSUE_TITLE_PREFIX: "Quest: "

jobs:
  start_exercise:
    name: Start Exercise
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Check for existing open quest issue
        id: existing-open-issue
        uses: actions/github-script@v7
        with:
          script: |
            const expectedTitle = `${process.env.ISSUE_TITLE_PREFIX}${process.env.EXERCISE_TITLE}`;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            const matchingIssues = issues.filter(issue => !issue.pull_request && issue.title === expectedTitle);
            const existingIssue = matchingIssues[0];

            for (const duplicateIssue of matchingIssues.slice(1)) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicateIssue.number,
                state: 'closed'
              });
              core.info(`Closed duplicate open quest issue #${duplicateIssue.number}`);
            }

            if (existingIssue) {
              core.info(`Open quest issue already exists: #${existingIssue.number}`);
              core.setOutput('has_open_issue', 'true');
              core.setOutput('issue_url', existingIssue.html_url);
              core.setOutput('issue_number', existingIssue.number.toString());
            } else {
              core.setOutput('has_open_issue', 'false');
            }
        env:
          EXERCISE_TITLE: ${{ env.EXERCISE_TITLE }}
          ISSUE_TITLE_PREFIX: ${{ env.ISSUE_TITLE_PREFIX }}

      - name: Disable all exercise workflows
        run: |
          # Find all workflow files that start with a number (0-9)
          workflows=$(git ls-files | grep -E '^\.github/workflows/[0-9].*\.(yml|yaml)$')
          for workflow in $workflows; do
            workflow_name="$(basename "$workflow")"
            echo "Disabling workflow: $workflow_name"
            gh workflow disable "$workflow_name" || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build issue description
        id: build-issue-description
        uses: skills/action-text-variables@v4.0.0
        with:
          template-file: .github/steps/0-0-start.md
          template-vars: |
            none: "none"

      - name: Create issue
        id: create-issue
        if: steps.existing-open-issue.outputs.has_open_issue != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Show repo where issue will be created
            console.log(`Creating issue in repository: ${context.repo.owner}/${context.repo.repo}`);

            // Create the issue
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${process.env.ISSUE_TITLE_PREFIX}${process.env.EXERCISE_TITLE}`,
              body: process.env.ISSUE_BODY
            });

            // Return the location
            core.setOutput('issue_url', issue.html_url);
            core.setOutput('issue_number', issue.number.toString());
        env:
          ISSUE_REPOSITORY: ${{ env.ISSUE_REPOSITORY || github.repository }}
          ISSUE_BODY: ${{ steps.build-issue-description.outputs.updated-text }}
          EXERCISE_TITLE: ${{ env.EXERCISE_TITLE }}
          ISSUE_TITLE_PREFIX: ${{ env.ISSUE_TITLE_PREFIX }}

      - name: Set next issue URL
        id: set-next-issue-url
        uses: actions/github-script@v7
        env:
          EXISTING_ISSUE_URL: ${{ steps.existing-open-issue.outputs.issue_url }}
          CREATED_ISSUE_URL: ${{ steps.create-issue.outputs.issue_url }}
        with:
          script: |
            core.setOutput('issue_url', process.env.EXISTING_ISSUE_URL || process.env.CREATED_ISSUE_URL || '');

      - name: Add comment - close with next issue link
        if: github.event_name == 'issues' && github.event.action == 'closed' && steps.set-next-issue-url.outputs.issue_url != ''
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ github.event.issue.number }}
          file: ".github/steps/x-close-with-next-link.md"
          vars: |
            next_issue_url: ${{ steps.set-next-issue-url.outputs.issue_url }}

      - name: Reenable to allow restarting, and enable challenge picker workflow.
        run: |
          gh workflow enable "0-0 Start" || true
          gh workflow enable "0-1 Pick" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
