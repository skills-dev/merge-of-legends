name: 3-2 Ducky Check

on:
  issue_comment:
    types: [edited]

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  check_step_work:
    name: Check step work
    runs-on: ubuntu-latest
    if: ${{ !endsWith(github.actor, '[bot]') }}
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}

    outputs:
      all_passed: ${{ steps.verify-checks.outputs.all_passed }}

    steps:
      - uses: actions/checkout@v4

      - name: Find diagram comment
        id: find-diagram-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          body-includes: "## Software Developer Lifecycle"
          direction: last

      - name: Check diagram order
        id: check-diagram-order
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const { parseMermaidLabels, checkSDLCOrder } = require('./.github/workflows/check-mermaid-order');
            const { removeAlerts } = require('./.github/workflows/actions-utils');

            let commentBody = process.env.COMMENT_BODY;

            if (!commentBody) {
              core.setFailed('No diagram comment found.');
              return;
            }

            const labels = parseMermaidLabels(commentBody);
            const isCorrect = checkSDLCOrder(labels);

            // Remove any existing alerts before adding new feedback
            commentBody = removeAlerts(commentBody);

            if (isCorrect) {
              commentBody += `\n\n> [!TIP]\n> ✅ Perfect! That's the correct Software Developer Lifecycle order! 🐤\n`;
            } else {
              commentBody += `\n\n> [!Caution]\n> ❌ Not quite! Order found: ${labels.join(' → ')}. Try again!\n`;
              core.setFailed('Diagram order is incorrect.');
            }

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: parseInt(process.env.COMMENT_ID),
              body: commentBody
            });
        env:
          COMMENT_BODY: ${{ steps.find-diagram-comment.outputs.comment-body }}
          COMMENT_ID: ${{ steps.find-diagram-comment.outputs.comment-id }}

      - name: Verify all checks passed
        id: verify-checks
        uses: actions/github-script@v7
        env:
          steps_outcomes: ${{ toJson(steps.*.outcome) }}
        with:
          script: |
            core.info(`Steps outcomes: ${process.env.steps_outcomes}`);
            const allPassed = !process.env.steps_outcomes.includes('failure');
            core.setOutput('all_passed', allPassed.toString());
            if (allPassed) {
              core.info('All checks passed.');
            } else {
              core.info('Some checks failed. Please review the comments for details.');
            }

  finish_challenge:
    name: Finish challenge
    needs: check_step_work
    runs-on: ubuntu-latest
    if: needs.check_step_work.outputs.all_passed == 'true'
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add comment - finish
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ".github/steps/3-5-ducky-finish.md"

      # - name: Add comment - next challenge
      #   uses: GrantBirki/comment@v2.1.1
      #   with:
      #     issue-number: ${{ env.ISSUE_NUMBER }}
      #     file: ".github/steps/x-next-challenge.md"

      - name: Add comment - show tip
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ".github/steps/3-6-ducky-tip.md"

      - name: Add comment - share links
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ".github/steps/x-share-links.md"
          vars: |
            socials_text: "I just earned the Bubbles of Insight from Ducky in the Merge of Legends GitHub Skills quest! 🧙"

      - name: Build issue description
        id: build-next-issue-description
        uses: skills/action-text-variables@v3
        with:
          template-file: .github/steps/0-0-start.md
          template-vars: |
            none: "none"

      - name: Find or create next issue
        id: find-or-create-next-issue
        uses: actions/github-script@v7
        with:
          script: |
            const expectedTitle = `${process.env.ISSUE_TITLE_PREFIX}${process.env.EXERCISE_TITLE}`;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            const existingIssue = issues.find(issue => !issue.pull_request && issue.title === expectedTitle && issue.number !== Number(process.env.ISSUE_NUMBER));
            const nextIssue = existingIssue || (await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: expectedTitle,
              body: process.env.ISSUE_BODY
            })).data;
            core.setOutput('issue_url', nextIssue.html_url);
        env:
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
          ISSUE_BODY: ${{ steps.build-next-issue-description.outputs.updated-text }}
          EXERCISE_TITLE: "Merge of Legends"
          ISSUE_TITLE_PREFIX: "Quest: "

      - name: Add comment - close with next issue link
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ".github/steps/x-close-with-next-link.md"
          vars: |
            next_issue_url: ${{ steps.find-or-create-next-issue.outputs.issue_url }}

      - name: Close the issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: process.env.ISSUE_NUMBER,
              state: 'closed'
            });
        env:
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}

      - name: Disable current workflow
        run: |
          gh workflow disable "3-2 Ducky Check" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
