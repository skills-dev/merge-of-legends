name: 3-2 Ducky Check

on:
  issue_comment:
    types: [edited]

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  check_step_work:
    name: Check step work
    runs-on: ubuntu-latest
    if: ${{ !endsWith(github.actor, '[bot]') }}
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      REPO_IMAGE_BASE_URL: ${{ github.server_url }}/${{ github.repository }}/raw/${{ github.event.repository.default_branch }}/.github/images

    outputs:
      all_passed: ${{ steps.verify-checks.outputs.all_passed }}

    steps:
      - uses: actions/checkout@v5

      - name: Find match game comment
        id: find-match-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          body-includes: "## Ducky Match Game"
          direction: last

      - name: Check match game
        id: check-match-game
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const { parseUncoveredCards, checkDuckyMatches } = require('./.github/workflows/check-ducky-match');
            const { removeAlerts } = require('./.github/workflows/actions-utils');

            let commentBody = process.env.COMMENT_BODY;

            if (!commentBody) {
              core.setFailed('No match game comment found.');
              return;
            }

            const cards = parseUncoveredCards(commentBody);
            const isCorrect = checkDuckyMatches(cards);

            // Remove any existing alerts before adding new feedback
            commentBody = removeAlerts(commentBody);

            if (isCorrect) {
              commentBody += `\n\n> [!TIP]\n> ✅ Perfect! You uncovered all 6 cards and matched all 3 pairs! 🐤\n`;
            } else {
              commentBody += `\n\n> [!Caution]\n> ❌ Not quite. Fill all 6 cards and use each image exactly twice.\n`;
              core.setFailed('Match game is incorrect.');
            }

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: parseInt(process.env.COMMENT_ID),
              body: commentBody
            });
        env:
          COMMENT_BODY: ${{ steps.find-match-comment.outputs.comment-body }}
          COMMENT_ID: ${{ steps.find-match-comment.outputs.comment-id }}

      - name: Verify all checks passed
        id: verify-checks
        uses: actions/github-script@v7
        env:
          steps_outcomes: ${{ toJson(steps.*.outcome) }}
        with:
          script: |
            core.info(`Steps outcomes: ${process.env.steps_outcomes}`);
            const allPassed = !process.env.steps_outcomes.includes('failure');
            core.setOutput('all_passed', allPassed.toString());
            if (allPassed) {
              core.info('All checks passed.');
            } else {
              core.info('Some checks failed. Please review the comments for details.');
            }

  finish_challenge:
    name: Finish challenge
    needs: check_step_work
    runs-on: ubuntu-latest
    if: needs.check_step_work.outputs.all_passed == 'true'
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      REPO_IMAGE_BASE_URL: ${{ github.server_url }}/${{ github.repository }}/raw/${{ github.event.repository.default_branch }}/.github/images

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Add comment - show tip
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ".github/steps/3-6-ducky-tip.md"
          vars: |
            repo_image_base_url: ${{ env.REPO_IMAGE_BASE_URL }}

      - name: Add comment - finalize quest
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ".github/steps/3-5-ducky-finish.md"
          vars: |
            repo_image_base_url: ${{ env.REPO_IMAGE_BASE_URL }}

      - name: Close the issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              state: 'closed'
            });
        env:
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}

      - name: Disable current workflow
        run: |
          gh workflow disable "3-2 Ducky Check" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
