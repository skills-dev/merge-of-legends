name: 3-2 Ducky Check

on:
  workflow_dispatch:
    inputs:
      issue-repository:
        description: "The repository where the issue is located"
        required: false
        type: string
      issue-number:
        description: "The issue number"
        required: true
        type: number
  issue_comment:
    types: [created]

permissions:
  contents: read
  actions: write
  issues: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  check_step_work:
    name: Check step work
    runs-on: ubuntu-latest
    env:
      ISSUE_NUMBER: ${{ inputs.issue-number || github.event.issue.number }}

    outputs:
      all_passed: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Add comment - interrupted
        if: github.event_name == 'issue_comment'
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ".github/steps/3-4-ducky-talk.md"

      - name: Add dialog from Ducky, with delay between comments
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const delayDuration_ms = process.env.DELAY_DURATION_MS || 5000;

            // Load comments from file, load each line into an array, ignore empty lines
            const comments = fs.readFileSync(process.env.COMMENTS_FILE, 'utf-8')
              .split('\n')
              .map(line => line.trim())
              .filter(line => line.length > 0);

            // Function to introduce a delay
            const delay = ms => new Promise(res => setTimeout(res, ms));

            // Add a comment for each line in the comments array, with a delay between each
            for (let i = 0; i < comments.length; i++) {
              await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: process.env.ISSUE_NUMBER,
              body: comments[i]
              });
              
              // Wait for the specified delay duration before adding the next comment
              await delay(delayDuration_ms);
            }
        env:
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
          COMMENTS_FILE: .github/steps/3-3-ducky-talk.md
          DELAY_DURATION_MS: 500

      - name: Disable current workflow and enable restarting
        run: |
          gh workflow disable "3-2 Ducky Check" || true
          gh workflow enable "0-0 Start" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  finish_challenge:
    name: Finish challenge
    needs: check_step_work
    runs-on: ubuntu-latest
    if: needs.check_step_work.outputs.all_passed == 'true'
    env:
      ISSUE_NUMBER: ${{ inputs.issue-number || github.event.issue.number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add comment - finish
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ".github/steps/3-5-ducky-finish.md"

      - name: Add comment - next challenge
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ".github/steps/x-next-challenge.md"

      - name: Add comment - share links
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ".github/steps/x-share-links.md"
          vars: |
            socials_text: "I just earned the Bubbles of Insight from Ducky in the Merge of Legends GitHub Skills quest! 🧙"

      - name: Add comment - show tip
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ".github/steps/3-6-ducky-tip.md"

      - name: Build issue description
        id: build-next-issue-description
        uses: skills/action-text-variables@v3
        with:
          template-file: .github/steps/0-0-start.md
          template-vars: |
            none: "none"

      - name: Find or create next issue
        id: find-or-create-next-issue
        uses: actions/github-script@v7
        with:
          script: |
            const expectedTitle = `${process.env.ISSUE_TITLE_PREFIX}${process.env.EXERCISE_TITLE}`;
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            const existingIssue = issues.find(issue => !issue.pull_request && issue.title === expectedTitle && issue.number !== Number(process.env.ISSUE_NUMBER));
            const nextIssue = existingIssue || (await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: expectedTitle,
              body: process.env.ISSUE_BODY
            })).data;
            core.setOutput('issue_url', nextIssue.html_url);
        env:
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
          ISSUE_BODY: ${{ steps.build-next-issue-description.outputs.updated-text }}
          EXERCISE_TITLE: "Merge of Legends"
          ISSUE_TITLE_PREFIX: "Quest: "

      - name: Add comment - close with next issue link
        uses: GrantBirki/comment@v2.1.1
        with:
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ".github/steps/x-close-with-next-link.md"
          vars: |
            next_issue_url: ${{ steps.find-or-create-next-issue.outputs.issue_url }}

      - name: Close the issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: process.env.ISSUE_NUMBER,
              state: 'closed'
            });
        env:
          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}

      - name: Disable current workflow
        run: |
          gh workflow disable "3-2 Ducky Check" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
